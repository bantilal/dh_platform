{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Register – Digital Heroes</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
<div class="auth-page" style="padding:40px 24px;">
  <div class="auth-box" style="max-width:520px;">
    <div class="auth-logo">
      <div class="brand-icon">🌿</div>
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Join 1,284 golfers making a difference</div>
    </div>

    <div id="alertBox"></div>

    <form class="auth-form" id="regForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name *</label>
          <input type="text" class="form-control" id="first_name" placeholder="John" required />
          <span class="form-error" id="first_nameErr"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" id="last_name" placeholder="Smith" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address *</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
        <span class="form-error" id="emailErr"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Country Code</label>
          <input type="text" class="form-control" id="country_code" value="+44" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="contact_no" placeholder="07700 900000" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password * (min. 8 characters)</label>
        <input type="password" class="form-control" id="password" placeholder="Choose a strong password" required />
        <span class="form-error" id="passwordErr"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Choose a Charity *</label>
        <select class="form-control" id="charity_id" required>
          <option value="">Loading charities…</option>
        </select>
        <span class="form-error" id="charity_idErr"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Charity Contribution % (min. 10%)</label>
        <input type="number" class="form-control" id="charity_percent" value="10" min="10" max="100" />
        <span class="form-error" id="charity_percentErr"></span>
        <span class="text-muted text-xs mt-8">Minimum 10% of your subscription goes to your chosen charity.</span>
      </div>

      <!-- Plan selection -->
      <div class="form-group">
        <label class="form-label">Subscription Plan</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <label style="flex:1;min-width:160px;cursor:pointer;">
            <input type="radio" name="plan" value="monthly" checked style="display:none;" id="planMonthly" />
            <div class="card" id="planMonthlyCard" style="border-color:var(--primary);background:rgba(5,150,105,0.08);cursor:pointer;">
              <div style="font-weight:700;">Monthly</div>
              <div style="font-size:22px;font-weight:800;color:var(--primary-lt);">£9.99<span style="font-size:13px;color:var(--text-muted);">/mo</span></div>
            </div>
          </label>
          <label style="flex:1;min-width:160px;cursor:pointer;">
            <input type="radio" name="plan" value="yearly" style="display:none;" id="planYearly" />
            <div class="card" id="planYearlyCard" style="cursor:pointer;">
              <div style="font-weight:700;">Yearly <span class="badge badge-green" style="font-size:10px;">Save 25%</span></div>
              <div style="font-size:22px;font-weight:800;color:var(--gold);">£89.99<span style="font-size:13px;color:var(--text-muted);">/yr</span></div>
            </div>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="regBtn" style="justify-content:center;margin-top:6px;">
        🌿 Create Account & Subscribe
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
  </div>
</div>

<script src="{% static 'js/app.js' %}"></script>
<script>
// Load charities into select
async function loadCharities() {
  const res = await apiGet('charities/charity-list/');
  const sel = document.getElementById('charity_id');
  if (res.status && res.data.length) {
    sel.innerHTML = res.data.map(c =>
      `<option value="${c.charity_id}">${c.name}</option>`
    ).join('');
  } else {
    sel.innerHTML = '<option value="">No charities available</option>';
  }
}

// Plan card toggle
document.querySelectorAll('input[name="plan"]').forEach(radio => {
  radio.addEventListener('change', () => {
    document.getElementById('planMonthlyCard').style.borderColor = 'var(--border)';
    document.getElementById('planMonthlyCard').style.background = '';
    document.getElementById('planYearlyCard').style.borderColor  = 'var(--border)';
    document.getElementById('planYearlyCard').style.background   = '';
    const active = radio.value === 'monthly' ? 'planMonthlyCard' : 'planYearlyCard';
    document.getElementById(active).style.borderColor = 'var(--primary)';
    document.getElementById(active).style.background  = 'rgba(5,150,105,0.08)';
  });
});

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  setLoading(btn, true);
  document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

  const plan = document.querySelector('input[name="plan"]:checked').value;

  const res = await apiPost('auth/register/', {
    first_name:      document.getElementById('first_name').value,
    last_name:       document.getElementById('last_name').value,
    email:           document.getElementById('email').value,
    password:        document.getElementById('password').value,
    country_code:    document.getElementById('country_code').value,
    contact_no:      document.getElementById('contact_no').value,
    charity_id:      document.getElementById('charity_id').value || null,
    charity_percent: parseFloat(document.getElementById('charity_percent').value),
  });

  if (!res.status) {
    setLoading(btn, false);
    if (res.errors) {
      Object.entries(res.errors).forEach(([k, v]) => {
        const el = document.getElementById(k + 'Err');
        if (el) el.textContent = v;
      });
    } else {
      document.getElementById('alertBox').innerHTML =
        `<div class="alert alert-error">⚠️ ${res.error}</div>`;
    }
    return;
  }

  Auth.save(res.data.tokens, res.data);

  // Auto-create subscription
  const subRes = await apiPost('subscriptions/create/', { plan, charity_percent: parseFloat(document.getElementById('charity_percent').value) });
  setLoading(btn, false);
  window.location.href = '/dashboard/';
}

document.addEventListener('DOMContentLoaded', loadCharities);
</script>
</body>
</html>
