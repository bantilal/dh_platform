{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sign In – Digital Heroes</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand-icon">🌿</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your Digital Heroes account</div>
    </div>

    <div id="alertBox"></div>

    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
        <span class="form-error" id="emailErr"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Your password" required />
        <span class="form-error" id="passwordErr"></span>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="justify-content:center;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register/">Create one</a>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <a href="/" style="font-size:13px;color:var(--text-muted);">← Back to home</a>
    </div>
  </div>
</div>

<script src="{% static 'js/app.js' %}"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true);
  document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await apiPost('auth/login/', { email, password });
  setLoading(btn, false);

  if (!res.status) {
    if (res.errors) {
      if (res.errors.email)    document.getElementById('emailErr').textContent    = res.errors.email;
      if (res.errors.password) document.getElementById('passwordErr').textContent = res.errors.password;
    } else {
      document.getElementById('alertBox').innerHTML =
        `<div class="alert alert-error">⚠️ ${res.error || 'Login failed'}</div>`;
    }
    return;
  }

  Auth.save(res.data.tokens, res.data);
  window.location.href = res.data.role === 'admin' ? '/admin-panel/' : '/dashboard/';
}
</script>
</body>
</html>
